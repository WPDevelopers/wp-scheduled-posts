name: QA - Plugin Check (PCP)

permissions: read-all

on:
  workflow_dispatch:
    inputs:
      artifact-name:
        required: false
        type: string
  workflow_call:
    inputs:
      artifact-name:
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  plugin-check:
    runs-on: ubuntu-latest
    name: Plugin Check - WP Latest / PHP 8.4

    steps:
      - name: Setup PHP Runtime
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mysqli, mbstring, xml, gd
          tools: wp-cli

      - name: Download Built WP Scheduled Posts
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: ./wp-scheduled-posts-dist

      - name: Start Database
        run: |
          sudo systemctl start mysql
          mysql -u root -proot -e "CREATE DATABASE wordpress_test;"

      - name: Install WordPress Core
        run: |
          wp core download --path=./test-site --allow-root
          cd test-site
          wp config create --dbname=wordpress_test --dbuser=root --dbpass=root --dbhost=127.0.0.1 --allow-root
          wp core install \
            --url=http://localhost:8080 \
            --title="WPSP Plugin Check" \
            --admin_user=admin \
            --admin_password=password \
            --admin_email=test@example.com \
            --allow-root

      - name: Install and Activate WP Scheduled Posts
        run: |
          mkdir -p ./test-site/wp-content/plugins/wp-scheduled-posts
          cp -r ./wp-scheduled-posts-dist/wp-scheduled-posts/. ./test-site/wp-content/plugins/wp-scheduled-posts/

          echo "Plugin directory contents:"
          ls ./test-site/wp-content/plugins/wp-scheduled-posts | head -n 15

          cd test-site
          wp plugin activate wp-scheduled-posts --allow-root

      - name: Install Plugin Check Plugin
        run: |
          cd test-site
          wp plugin install plugin-check --activate --allow-root

      - name: Run Plugin Check
        run: |
          cd test-site

          wp plugin check wp-scheduled-posts --ignore-warnings --allow-root 2>&1 | tee /tmp/pcp-output.txt || true

          if grep -qF "Success: Checks complete. No errors found." /tmp/pcp-output.txt; then
            echo "✅ Plugin Check passed — no errors found."
          else
            echo "❌ Plugin Check found errors:"
            echo "------------------------------------------------------------"
            cat /tmp/pcp-output.txt
            echo "------------------------------------------------------------"
            exit 1
          fi